name: Build and push container images

# Builds the five container images consumed by the Azure Container Apps and
# pushes them to GHCR at ghcr.io/<owner>/<repo>/<image>. Terraform's
# `local.image_base` (ghcr.io/${var.gh_repo}) resolves to the same namespace.
#
# Each image is published under an *immutable* tag = the commit's 7-char short
# SHA (matching `scripts/build-images.sh` / `scripts/deploy.sh`), plus the moving
# `:latest` pointer on the default branch. Deploy by pinning
# `container_image_tag = "<short-sha>"` (NOT "latest") so the Container Apps roll
# a fresh revision for the exact build. The resolved tag is printed in the job
# summary.

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "mcp-servers/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional extra tag to publish (in addition to the short-sha + latest)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: concierge-agent
            context: agents/concierge_agent
          - image: travel-tools-mcp
            context: mcp-servers/travel-tools
          - image: cart-tools-mcp
            context: mcp-servers/cart-tools
          - image: vic-mock-mcp
            context: mcp-servers/vic-mock
          - image: merchant-mock-mcp
            context: mcp-servers/merchant-mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published tag
        run: |
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"
          {
            echo "### ${{ matrix.image }}"
            echo "Immutable tag: \`${SHORT_SHA}\` — deploy with \`container_image_tag=${SHORT_SHA}\`"
            echo ""
            echo '```'
            echo '${{ steps.meta.outputs.tags }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
