name: Build and push container images

# Builds the five container images consumed by the Azure Container Apps and
# pushes them to GHCR at ghcr.io/<owner>/<repo>/<image>. Terraform's
# `local.image_base` (ghcr.io/${var.gh_repo}) resolves to the same namespace,
# so set `gh_repo = "<owner>/<repo>"` and `container_image_tag = "latest"`.

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "mcp-servers/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to publish in addition to latest/sha"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: concierge-agent
            context: agents/concierge_agent
          - image: travel-tools-mcp
            context: mcp-servers/travel-tools
          - image: cart-tools-mcp
            context: mcp-servers/cart-tools
          - image: vic-mock-mcp
            context: mcp-servers/vic-mock
          - image: merchant-mock-mcp
            context: mcp-servers/merchant-mock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
